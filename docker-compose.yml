services:
  mission-control:
    container_name: mission-control
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_OPENCLAW_GATEWAY_URL: ws://127.0.0.1:18789
        OPENCLAW_GATEWAY_TOKEN: c48dbe0ce2d3e4b08698cb52f163b777308b28438d9e7862
    image: mission-control:latest
    network_mode: host
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      NODE_ENV: production
      DATABASE_PATH: /app/data/mission-control.db
      WORKSPACE_BASE_PATH: /app/workspace
      PROJECTS_PATH: /app/workspace/projects
      # Set this if OpenClaw runs on the host machine:
      OPENCLAW_GATEWAY_URL: ws://127.0.0.1:18789
      NEXT_PUBLIC_OPENCLAW_GATEWAY_URL: ws://127.0.0.1:18789
    # user: "1001:1001"
    volumes:
      - mission-control-data:/app/data
      - mission-control-workspace:/app/workspace

      # Make host paths available inside container so workspace CODEBASE_DIR
      # values like /home/vlad-plk/clients/... validate correctly.
      - ${HOST_VLAD_HOME:-/home/vlad-plk}:/home/vlad-plk
    restart: unless-stopped

volumes:
  mission-control-data:
  mission-control-workspace:
